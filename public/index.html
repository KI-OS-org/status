<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KI-OS Status</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #7d8590; --green: #3fb950;
      --red: #f85149; --yellow: #d29922; --accent: #f0a500;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    header { border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    .dot-all-good { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }

    main { max-width: 760px; margin: 3rem auto; padding: 0 1.5rem; }

    .overall {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.75rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .overall-icon { font-size: 2rem; }
    .overall-title { font-size: 1.3rem; font-weight: 600; }
    .overall-sub { color: var(--muted); font-size: 0.85rem; margin-top: .25rem; }

    .services { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 2.5rem; }

    .service {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .service-name { flex: 1; font-weight: 500; }
    .service-url  { color: var(--muted); font-size: 0.8rem; }
    .badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: .25rem .75rem;
      border-radius: 999px;
    }
    .badge-up      { background: rgba(63,185,80,.15); color: var(--green); }
    .badge-down    { background: rgba(248,81,73,.15);  color: var(--red); }
    .badge-unknown { background: rgba(210,153,34,.15); color: var(--yellow); }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-up      { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-down    { background: var(--red);   box-shadow: 0 0 6px var(--red); }
    .dot-unknown { background: var(--yellow); }

    .meta { color: var(--muted); font-size: 0.8rem; text-align: center; margin-top: 2rem; }
    footer { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 2rem; border-top: 1px solid var(--border); margin-top: 3rem; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">🦁</span>
  <h1>KI-OS Status</h1>
  <div class="dot-all-good" id="headerDot"></div>
  <span style="color:var(--muted);font-size:.85rem" id="headerLabel">Checking...</span>
</header>

<main>
  <div class="overall" id="overall">
    <div class="overall-icon" id="overallIcon">⏳</div>
    <div>
      <div class="overall-title" id="overallTitle">Checking services...</div>
      <div class="overall-sub" id="overallSub"></div>
    </div>
  </div>

  <div class="services" id="services">
    <div class="service">
      <div class="status-dot dot-unknown" id="dot-1"></div>
      <div>
        <div class="service-name">ki-os.org</div>
        <div class="service-url">https://ki-os.org</div>
      </div>
      <span class="badge badge-unknown" id="badge-1">—</span>
    </div>
    <div class="service">
      <div class="status-dot dot-unknown" id="dot-2"></div>
      <div>
        <div class="service-name">Community Edition</div>
        <div class="service-url">github.com/KI-OS-org/ki-os</div>
      </div>
      <span class="badge badge-unknown" id="badge-2">—</span>
    </div>
    <div class="service">
      <div class="status-dot dot-unknown" id="dot-3"></div>
      <div>
        <div class="service-name">updates.ki-os.org</div>
        <div class="service-url">Telemetry &amp; Update Checks</div>
      </div>
      <span class="badge badge-unknown" id="badge-3">—</span>
    </div>
  </div>

  <div class="meta" id="lastCheck"></div>
</main>

<footer>
  <a href="https://ki-os.org">ki-os.org</a> · Checks every hour · <a href="https://github.com/KI-OS-org/status">GitHub</a>
</footer>

<script>
function setService(id, status) {
  const dot   = document.getElementById('dot-' + id);
  const badge = document.getElementById('badge-' + id);
  dot.className   = 'status-dot ' + (status === 'up' ? 'dot-up' : status === 'down' ? 'dot-down' : 'dot-unknown');
  badge.className = 'badge ' + (status === 'up' ? 'badge-up' : status === 'down' ? 'badge-down' : 'badge-unknown');
  badge.textContent = status === 'up' ? 'Operational' : status.startsWith('down') ? 'Outage' : 'Unknown';
}

async function load() {
  try {
    const r = await fetch('status.json?t=' + Date.now());
    if (!r.ok) throw new Error('no status.json yet');
    const d = await r.json();

    const s1 = d.ki_os_org || 'unknown';
    const s2 = d.github    || 'unknown';
    const s3 = d.updates   || 'unknown';

    setService(1, s1);
    setService(2, s2);
    setService(3, s3);

    const allUp = [s1, s2, s3].every(s => s === 'up');
    const anyDown = [s1, s2, s3].some(s => s.startsWith('down'));

    document.getElementById('overallIcon').textContent  = allUp ? '✅' : anyDown ? '🔴' : '⚠️';
    document.getElementById('overallTitle').textContent = allUp ? 'All Systems Operational' : anyDown ? 'Service Disruption' : 'Partial Outage';
    document.getElementById('headerDot').style.background = allUp ? 'var(--green)' : anyDown ? 'var(--red)' : 'var(--yellow)';
    document.getElementById('headerLabel').textContent = allUp ? 'All systems operational' : 'Incident detected';

    const ts = new Date(d.ts);
    document.getElementById('overallSub').textContent  = 'Last checked: ' + ts.toUTCString();
    document.getElementById('lastCheck').textContent   = 'Checked hourly via GitHub Actions · Last update: ' + ts.toUTCString();

  } catch {
    document.getElementById('overallTitle').textContent = 'Status page initializing...';
    document.getElementById('overallSub').textContent   = 'First check runs within the hour.';
  }
}

load();
setInterval(load, 60_000);
</script>
</body>
</html>
